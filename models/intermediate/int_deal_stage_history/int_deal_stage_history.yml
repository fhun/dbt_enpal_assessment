version: 2

models:
  - name: int_deal_stage_history
    description: The intermediate model for deal stage history, enriched with related dimensions
    config:
      tags: ["intermediate"]
    columns:
      - name: deal_id
        description: ID of the deal
        data_tests:
          - not_null
      - name: stage_id
        description: ID of the stage that the deal was moved to
        data_tests:
          - not_null
      - name: stage_name
        description: Name of the new stage
      - name: stage_started_at
        description: Timestamp of when the stage was entered
      - name: stage_ended_at
        description: Timestamp of when the stage was exited
      - name: stage_duration_days
        description: >
            Duration of the stage in days, calculated as the difference between stage_ended_at
            and stage_started_at. For completed stages, this will be the actual duration.
            For the current stage, this will be the duration from stage_started_at to the current timestamp.
      - name: is_current_stage
        description: Boolean indicating whether this is the current stage of the deal
