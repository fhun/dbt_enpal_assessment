version: 2

models:
  - name: stg_users
    description: The staging model for users
    config:
      tags: ["staging"]
    columns:
      - name: user_id
        description: ID of the user
        data_tests:
          - unique
          - not_null
      - name: user_name
        description: Name of the user
      - name: user_email
        description: Email of the user
      - name: modified_at
        description: Last modified timestamp
        data_tests:
          - not_null
